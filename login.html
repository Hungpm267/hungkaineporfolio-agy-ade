<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin login portal for portfolio management." />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Login - Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/login.css" />
  <style>
    /* ─── CSS Custom Properties ─────────────────────────────────── */
    :root {
      --accent: #8b5cf6;
      --accent-light: #a78bfa;
      --accent-dark: #7c3aed;
      --accent-glow: rgba(139, 92, 246, 0.35);
      --bg-1: #0f0a1e;
      --bg-2: #1a0a2e;
      --bg-3: #0d1b3e;
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f1f0ff;
      --text-secondary: rgba(241, 240, 255, 0.6);
      --text-muted: rgba(241, 240, 255, 0.35);
      --error: #f87171;
      --success: #34d399;
      --input-bg: rgba(255, 255, 255, 0.06);
      --input-border: rgba(255, 255, 255, 0.1);
      --input-focus: rgba(139, 92, 246, 0.5);
      --shadow-glow: 0 0 60px rgba(139, 92, 246, 0.2), 0 0 120px rgba(99, 50, 200, 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text-primary);
      overflow: hidden;
    }

    body {
      position: relative;
      background: var(--bg-1);
      animation: bodyShift 18s ease-in-out infinite alternate;
    }

    @keyframes bodyShift {
      0%   { background: var(--bg-1); }
      50%  { background: var(--bg-2); }
      100% { background: var(--bg-3); }
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      pointer-events: none;
    }
    body::before {
      width: 600px; height: 600px;
      top: -200px; left: -200px;
      background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
      animation: orbFloat1 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 500px; height: 500px;
      bottom: -150px; right: -150px;
      background: radial-gradient(circle, #1d4ed8 0%, transparent 70%);
      animation: orbFloat2 15s ease-in-out infinite alternate;
    }

    @keyframes orbFloat1 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(80px, 60px) scale(1.15); }
    }
    @keyframes orbFloat2 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-60px, -80px) scale(1.1); }
    }

    .orb-extra {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.25;
      pointer-events: none;
      width: 300px; height: 300px;
      top: 40%; left: 60%;
      background: radial-gradient(circle, #ec4899 0%, transparent 70%);
      animation: orbFloat3 20s ease-in-out infinite alternate;
    }

    @keyframes orbFloat3 {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(-40px, 50px); }
    }

    .stars {
      position: fixed; inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--duration, 3s) ease-in-out infinite alternate;
      opacity: 0;
    }
    @keyframes twinkle {
      0%   { opacity: 0; transform: scale(1); }
      50%  { opacity: 0.7; }
      100% { opacity: 0.1; transform: scale(0.5); }
    }

    .login-page {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .login-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      box-shadow: var(--shadow-glow), 0 24px 64px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
      animation: cardReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(139,92,246,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent-dark), var(--accent-light));
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.2);
      animation: iconPulse 3s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 8px 32px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.2); }
      50%       { box-shadow: 0 8px 48px rgba(139,92,246,0.55), inset 0 1px 0 rgba(255,255,255,0.2); }
    }

    .logo-icon svg {
      width: 32px; height: 32px;
      color: white;
    }

    .logo-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 30%, var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-subtitle {
      font-size: 0.82rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .field-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.03em;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      display: flex;
      pointer-events: none;
      transition: color 0.2s;
    }
    .input-icon svg { width: 18px; height: 18px; }

    .field-input {
      width: 100%;
      padding: 0.75rem 2.8rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
      outline: none;
    }
    .field-input::placeholder { color: var(--text-muted); }
    .field-input:focus {
      border-color: var(--accent);
      background: rgba(139, 92, 246, 0.08);
      box-shadow: 0 0 0 3px var(--input-focus);
    }
    .input-wrapper:focus-within .input-icon { color: var(--accent-light); }

    .toggle-password {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    .toggle-password:hover { color: var(--accent-light); background: rgba(139,92,246,0.1); }
    .toggle-password svg { width: 18px; height: 18px; }
    .eye-off { display: none; }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .remember-row input[type="checkbox"] {
      accent-color: var(--accent);
      width: 15px; height: 15px;
      cursor: pointer;
    }
    .remember-row label {
      font-size: 0.83rem;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
    }

    .error-msg {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1rem;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: 10px;
      color: var(--error);
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    .error-msg.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .error-msg svg { width: 16px; height: 16px; flex-shrink: 0; }

    .btn-login {
      position: relative;
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 24px var(--accent-glow);
      margin-top: 0.4rem;
    }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 32px var(--accent-glow);
    }
    .btn-login:active:not(:disabled) { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }

    .btn-login::after {
      content: '';
      position: absolute;
      top: -50%; left: -100%;
      width: 60%; height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: skewX(-15deg);
      transition: left 0.5s;
    }
    .btn-login:hover::after { left: 150%; }

    .btn-text { transition: opacity 0.2s; }
    .btn-spinner {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
    }
    .btn-login.loading .btn-text { opacity: 0; }
    .btn-login.loading .btn-spinner { display: flex; }

    .spinner-ring {
      width: 22px; height: 22px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .login-footer {
      margin-top: 1.5rem;
      text-align: center;
    }
    .login-footer a {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .login-footer a:hover { color: var(--accent-light); }

    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem; border-radius: 20px; }
    }
  </style>
</head>
<body>

  <div class="orb-extra"></div>
  <div class="stars" id="starsContainer"></div>

  <div class="login-page">
    <div class="login-card">

      <div class="logo-area">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
            <polyline points="2 17 12 22 22 17"/>
            <polyline points="2 12 12 17 22 12"/>
          </svg>
        </div>
        <h1 class="logo-title">Admin Panel</h1>
        <p class="logo-subtitle">Portfolio Management System</p>
      </div>

      <form class="login-form" id="loginForm" novalidate autocomplete="on">

        <div class="field-group">
          <label class="field-label" for="username">Username</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input id="username" class="field-input" type="text" name="username" placeholder="Enter username" autocomplete="username" required />
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input id="password" class="field-input" type="password" name="password" placeholder="Enter password" autocomplete="current-password" required />
            <button type="button" class="toggle-password" id="togglePwd" aria-label="Show password">
              <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="remember-row">
          <input type="checkbox" id="rememberMe" name="rememberMe" />
          <label for="rememberMe">Remember me for 7 days</label>
        </div>

        <div class="error-msg" id="errorMsg" role="alert" aria-live="polite">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="errorText">Invalid username or password.</span>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner">
            <span class="spinner-ring"></span>
          </span>
        </button>

      </form>

      <div class="login-footer">
        <a href="index.html">Back to public site</a>
      </div>

    </div>
  </div>

  <!-- Supabase SDK & Config -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function generateStars() {
      const container = document.getElementById('starsContainer');
      for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.cssText = 'left:' + (Math.random()*100) + '%;top:' + (Math.random()*100) + '%;--duration:' + (2+Math.random()*4) + 's;animation-delay:' + (Math.random()*4) + 's;width:' + (Math.random()>0.7?3:2) + 'px;height:' + (Math.random()>0.7?3:2) + 'px;';
        container.appendChild(star);
      }
    })();

    document.addEventListener('DOMContentLoaded', function () {
      if (typeof Auth !== 'undefined' && Auth.isLoggedIn && Auth.isLoggedIn()) {
        window.location.replace('admin.html');
        return;
      }

      var pwdInput  = document.getElementById('password');
      var toggleBtn = document.getElementById('togglePwd');
      var eyeOn     = toggleBtn.querySelector('.eye-on');
      var eyeOff    = toggleBtn.querySelector('.eye-off');

      toggleBtn.addEventListener('click', function () {
        var isText = pwdInput.type === 'text';
        pwdInput.type = isText ? 'password' : 'text';
        eyeOn.style.display  = isText ? 'block' : 'none';
        eyeOff.style.display = isText ? 'none'  : 'block';
        this.setAttribute('aria-label', isText ? 'Show password' : 'Hide password');
      });

      var form      = document.getElementById('loginForm');
      var btnLogin  = document.getElementById('btnLogin');
      var errorMsg  = document.getElementById('errorMsg');
      var errorText = document.getElementById('errorText');

      function showError(msg) {
        errorText.textContent = msg || 'Invalid username or password.';
        errorMsg.classList.add('visible');
        var card = document.querySelector('.login-card');
        card.animate([
          { transform: 'translateX(-8px)' },
          { transform: 'translateX(8px)' },
          { transform: 'translateX(-6px)' },
          { transform: 'translateX(6px)' },
          { transform: 'translateX(0)' }
        ], { duration: 400, easing: 'ease-out' });
      }

      function hideError() {
        errorMsg.classList.remove('visible');
      }

      function setLoading(on) {
        btnLogin.disabled = on;
        btnLogin.classList.toggle('loading', on);
      }

      form.addEventListener('input', hideError);

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        hideError();

        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        var remember = document.getElementById('rememberMe').checked;

        if (!username || !password) {
          showError('Please enter both username and password.');
          return;
        }

        setLoading(true);

        try {
          var success = false;
          if (typeof Auth !== 'undefined' && Auth.login) {
            success = await Auth.login(username, password, remember);
          } else {
            var users = JSON.parse(localStorage.getItem('portfolio_users') || '[]');
            var found = users.find(function(u) { return u.username === username && u.password === password; });
            if (found) {
              sessionStorage.setItem('portfolio_auth', JSON.stringify({ username: username, loggedIn: true, ts: Date.now() }));
              if (remember) {
                localStorage.setItem('portfolio_auth_remember', JSON.stringify({ username: username, loggedIn: true, ts: Date.now() }));
              }
              success = true;
            }
          }

          if (success) {
            btnLogin.style.background = 'linear-gradient(135deg, #059669, #10b981)';
            btnLogin.querySelector('.btn-text').textContent = 'Success!';
            setTimeout(function () {
              window.location.replace('admin.html');
            }, 500);
          } else {
            setLoading(false);
            showError('Invalid username or password. Please try again.');
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
          }
        } catch (err) {
          setLoading(false);
          showError('An error occurred. Please try again.');
          console.error('[Login]', err);
        }
      });

      document.getElementById('username').focus();
    });
  </script>
</body>
</html>
